<!DOCTYPE html>
<html>
<head>
    <title>Article List</title>
</head>
<body>
    <h1>Articles</h1>

    {% for article in page_obj %}
        <div>
            <h2>{{ article.title }}</h2>
            <p>{{ article.content|truncatewords:30 }}</p>
            <small>Published: {{ article.publish }}</small>
        </div>
        <hr>
    {% empty %}
        <p>No articles available.</p>
    {% endfor %}
    {% include "articleApp/pagination.html" with page=page_obj %}
</body>
</html>
