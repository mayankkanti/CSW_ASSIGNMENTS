{% extends "blog/base.html" %}
{% block title %}{{ post.title }}{% endblock %}
{% block content %}
  <h2>{{ post.title }}</h2>
  <p>By {{ post.author }} | {{ post.publish }}</p>
  <p>{{ post.body }}</p>
  <p>
    <a href="{% url 'blog:post_share' post.id %}">Share Post</a>
  </p>
  <a href="{% url 'blog:post_list' %}">Back to Blog</a>
{% endblock %}
