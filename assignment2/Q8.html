<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            width: 50%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: lightgray;
        }
        tr:nth-child(even){
            background-color: lightyellow;
        }
        tr:nth-child(odd){
            background-color: lightcyan;
        }
    </style>
</head>
<body>
    <h1>My Weekly Schedule</h1>
    <table border="1">
        <tr>
            <th>Day</th>
            <th>Activities</th>
        </tr>
        <tr>
            <td>Sunday</td>
            <td>Sleep</td>
        </tr>
        <tr>
            <td>Monday</td>
            <td>Sleep</td>
        </tr>
        <tr>
            <td>Tuesday</td>
            <td>Sleep</td>
        </tr>
        <tr>
            <td>Wednesday</td>
            <td>Sleep</td>
        </tr>
        <tr>
            <td>Thrusday</td>
            <td>Sleep</td>
        </tr>
        <tr>
            <td>Friday</td>
            <td>Sleep</td>
        </tr>
        <tr>
            <td>Saturday</td>
            <td>Sleep</td>
        </tr>
    </table>
</body>
</html>
